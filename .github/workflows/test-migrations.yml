name: Test Migrations

on:
  pull_request:
    paths:
      - 'supabase/migrations/**'
      - 'supabase/seed.sql'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase
        run: supabase start

      - name: Verify migrations applied
        env:
          PGPASSWORD: postgres
        run: |
          MIGRATION_COUNT=$(psql -h 127.0.0.1 -p 54322 -U postgres -d postgres -t -c "SELECT COUNT(*) FROM supabase_migrations.schema_migrations" | tr -d ' ')
          EXPECTED_COUNT=$(ls supabase/migrations/*.sql | wc -l | tr -d ' ')

          if [ "$MIGRATION_COUNT" != "$EXPECTED_COUNT" ]; then
            echo "Migration count mismatch: expected $EXPECTED_COUNT, got $MIGRATION_COUNT"
            exit 1
          fi
          echo "All $MIGRATION_COUNT migrations applied successfully"

      - name: Verify required data
        env:
          PGPASSWORD: postgres
        run: |
          # 食材マスターが投入されているか
          INGREDIENT_COUNT=$(psql -h 127.0.0.1 -p 54322 -U postgres -d postgres -t -c "SELECT COUNT(*) FROM ingredients" | tr -d ' ')
          if [ "$INGREDIENT_COUNT" -lt 100 ]; then
            echo "Ingredients not seeded: only $INGREDIENT_COUNT rows"
            exit 1
          fi
          echo "Ingredients: $INGREDIENT_COUNT rows"

          # エイリアスが投入されているか
          ALIAS_COUNT=$(psql -h 127.0.0.1 -p 54322 -U postgres -d postgres -t -c "SELECT COUNT(*) FROM ingredient_aliases" | tr -d ' ')
          if [ "$ALIAS_COUNT" -lt 50 ]; then
            echo "Aliases not seeded: only $ALIAS_COUNT rows"
            exit 1
          fi
          echo "Aliases: $ALIAS_COUNT rows"

          # 親子関係が設定されているか
          PARENT_COUNT=$(psql -h 127.0.0.1 -p 54322 -U postgres -d postgres -t -c "SELECT COUNT(*) FROM ingredients WHERE parent_id IS NOT NULL" | tr -d ' ')
          if [ "$PARENT_COUNT" -lt 10 ]; then
            echo "Parent relationships not set: only $PARENT_COUNT rows"
            exit 1
          fi
          echo "Parent relationships: $PARENT_COUNT rows"

      - name: Verify RLS backstop (Issue #110)
        env:
          PGPASSWORD: postgres
        run: |
          # anon（ブラウザに露出する publishable キー相当）がユーザーデータを
          # 読めないことを検証する。RLS を弱める将来のマイグレーションを検知する回帰テスト。
          #
          # 拒否は2層で起こりうる:
          #   - GRANT 層: anon にテーブル権限がない → "permission denied"
          #   - RLS 層 : 権限はあるがポリシーにマッチしない → 0 件
          # 環境（ローカル/CI/Cloud）で GRANT 付与が異なるため、どちらも「拒否＝合格」とし、
          # 1 件でも返った場合のみ FAIL とする。
          PSQL="psql -h 127.0.0.1 -p 54322 -U postgres -d postgres -t -A"

          # 検証用データを superuser（RLS バイパス）で投入
          $PSQL -c "INSERT INTO users (id, line_user_id, display_name) VALUES ('00000000-0000-0000-0000-0000000000aa', 'U_rls_test', 'RLS Test') ON CONFLICT (line_user_id) DO NOTHING;"
          $PSQL -c "INSERT INTO recipes (user_id, title, url) VALUES ('00000000-0000-0000-0000-0000000000aa', 'RLS Secret', 'https://example.com/rls-test') ON CONFLICT (user_id, url) DO NOTHING;"

          for t in recipes users recipe_ingredients; do
            OUT=$($PSQL -c "SET ROLE anon; SELECT count(*) FROM ${t};" 2>&1 || true)
            # 数値のみの行が count（クエリ成功＝RLS 評価まで到達したケース）
            N=$(echo "$OUT" | grep -E '^[0-9]+$' | tail -1)
            if echo "$OUT" | grep -qi "permission denied"; then
              echo "  ${t}: anon denied at GRANT level (OK)"
            elif [ "$N" = "0" ]; then
              echo "  ${t}: anon sees 0 rows via RLS (OK)"
            else
              echo "RLS backstop FAILED: anon can read ${t} (count='${N}')"
              echo "$OUT"
              exit 1
            fi
          done
          echo "RLS backstop OK: anon denied on user data tables"

          # 公開マスターは anon 参照用の SELECT ポリシーが残っていること（誤ロックダウン検知）。
          # 実行時の読取可否は GRANT 付与に依存し環境差があるため、ポリシー存在で意図を検証する。
          for t in ingredients ingredient_aliases; do
            POL=$($PSQL -c "SELECT count(*) FROM pg_policies WHERE tablename='${t}' AND cmd='SELECT' AND 'public' = ANY(roles);")
            if [ "$POL" -lt 1 ]; then
              echo "RLS FAILED: ${t} lost its public SELECT policy"
              exit 1
            fi
            echo "  ${t}: public SELECT policy present (OK)"
          done
          echo "RLS public master OK"

      - name: Stop Supabase
        if: always()
        run: supabase stop
